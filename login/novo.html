<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bora Tomar Uma? - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" type="image/png" href="../img/bebida-gelada.gif">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            /* Removido o overflow hidden para permitir rolar em telas muito pequenas */
        }
        
        .background-kivy {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Camada escura (gradiente) + Imagem */
            background-image: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)), url('../img/login.webp'); 
            background-size: cover; 
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
        }

        .screen { display: none; width: 100%; }
        .screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .toggle-password {
            cursor: pointer;
            position: absolute;
            right: 0.75rem; 
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
        }

        /* Efeito de Vidro Fosco no Card */
        .glass-card {
            background: rgba(17, 24, 39, 0.85); /* bg-gray-900 com opacidade */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'kivy-primary': '#E48F4F',
                        'kivy-dark': '#252525',
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="background-kivy"></div>

    <div class="max-w-[400px] w-full relative"> 
        
        <div id="login" class="screen active p-2">
            <div class="w-full p-8 rounded-3xl glass-card shadow-2xl"> 
                
                <div class="flex justify-center mb-6">
                    <div class="w-20 h-20 rounded-full bg-kivy-primary flex items-center justify-center text-kivy-dark border-4 border-gray-800 shadow-lg">
                        <i class="fas fa-user text-4xl"></i> 
                    </div>
                </div>

                <h2 class="text-2xl font-bold text-white text-center mb-8">Acesso</h2>
                
                <form id="login-form" class="space-y-4">
                    <div class="relative">
                        <input type="text" id="login-usuario" placeholder="Usuário" 
                               class="w-full px-4 py-3 rounded-xl text-black placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-kivy-primary transition duration-200" required>
                    </div>

                    <div class="relative">
                        <input type="password" id="login-senha" placeholder="Senha" 
                               class="w-full px-4 py-3 rounded-xl text-black placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-kivy-primary transition duration-200" required>
                        <i class="fas fa-eye toggle-password text-gray-500 hover:text-kivy-primary" data-target="login-senha"></i>
                    </div>

                    <button type="submit" class="w-full h-12 bg-kivy-primary text-kivy-dark rounded-xl font-bold text-lg hover:bg-opacity-90 active:scale-95 transition-all duration-200 shadow-lg mt-4">
                        Entrar
                    </button>
                </form>

                <div class="flex flex-col space-y-3 text-center mt-8">
                    <button type="button" onclick="navigateTo('cadastro')" class="text-sm text-kivy-primary hover:underline">
                        Novo por aqui? Cadastre-se
                    </button>
                    <button type="button" onclick="navigateTo('recuperar-senha')" class="text-xs text-gray-400">
                        Esqueci minha senha
                    </button>
                </div>
            </div>
        </div>

        </div>

    <div id="global-toast" style="bottom: -100px;" class="fixed left-1/2 -translate-x-1/2 p-4 rounded-xl shadow-2xl text-white transition-all duration-300 z-50 min-w-[280px] text-center font-medium"></div>

    <script>
        // ... (Mantenha sua lógica de script original aqui, ela funciona perfeitamente!)
        // Apenas certifique-se de manter as funções navigateTo e showMessage.
        
        window.navigateTo = function(targetScreenId) {
            document.querySelectorAll('.screen').forEach(screen => screen.classList.remove('active'));
            const target = document.getElementById(targetScreenId);
            if(target) target.classList.add('active');
        };

        // Lógica do Olho de Senha (simplificada para o novo HTML)
        document.querySelectorAll('.toggle-password').forEach(icon => {
            icon.addEventListener('click', function() {
                const input = document.getElementById(this.dataset.target);
                const isPass = input.type === 'password';
                input.type = isPass ? 'text' : 'password';
                this.classList.toggle('fa-eye', !isPass);
                this.classList.toggle('fa-eye-slash', isPass);
            });
        });
    </script>
</body>
</html>
