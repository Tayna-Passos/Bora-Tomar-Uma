<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bora Tomar Uma? - Cadastro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/png" href="../img/bebida-gelada.gif">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed; /* Mantém o fundo fixo ao rolar */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .glass-card {
            background: rgba(25, 25, 25, 0.65);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        /* Botão Seta - Desktop */
        .botao-seta {
            background-color: #FF8C00;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-right: 900px; /* Isso será corrigido no mobile abaixo */
            margin-bottom: 20px;
        }

        .logo-box {
            background-color: #e48f4f;
            width: 60px;
            height: 60px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            position: relative;
        }

        .logo-box i { font-size: 28px; color: #1a1a1a; }

        .online-dot {
            width: 15px; height: 15px;
            background-color: #00ca4e;
            border: 3px solid #1a1a1a;
            border-radius: 50%;
            position: absolute;
            bottom: -2px; right: -2px;
        }

        h2 { color: white; font-weight: 800; font-size: 1.8rem; margin-bottom: 5px; }
        p.subtitle { color: #ccc; font-size: 0.9rem; margin-bottom: 30px; }

        .input-group { text-align: left; margin-bottom: 20px; }
        label { color: #999; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; margin-left: 5px; display: block; margin-bottom: 8px; }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px 18px;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        .btn-primary {
            width: 100%;
            background-color: #e48f4f;
            color: #1a1a1a;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-outline {
            width: 100%;
            background: transparent;
            color: white;
            border: 1px solid #444;
            border-radius: 12px;
            padding: 14px;
            display: inline-block;
            text-decoration: none;
            font-weight: 600;
        }

        /* --- CORREÇÃO PARA MOBILE --- */
        @media (max-width: 768px) {
            body {
                display: block; /* Remove o flex center que "esmagava" o card */
                overflow-x: hidden;
                overflow-y: auto;
                padding: 15px;
            }

            .glass-card {
                margin: 20px auto; /* Centraliza o card manualmente */
                padding: 30px 20px;
                border-radius: 30px;
                max-width: 100%;
            }

            .botao-seta {
                margin-right: 0 !important; /* MATA O ERRO DA IMAGEM */
                width: auto;
                margin-bottom: 20px;
            }

            input {
                font-size: 16px; /* Evita zoom no iPhone */
            }
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <a href="../index.html" class="link-botao">
            <button class="botao-seta">
                <span>&#11013;</span> Voltar
            </button>
        </a>
        
        <div class="logo-box">
            <i class="fas fa-beer-mug-empty"></i>
            <div class="online-dot"></div>
        </div>
        
        <h2>Criar conta</h2>
        <p class="subtitle">Junte-se à nossa comunidade cervejeira.</p>

        <form action="#">
            <div class="input-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" placeholder="ex: mestre_cervejeiro" required>
            </div>

            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>

            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-primary">Finalizar Cadastro</button>
        </form>

        <p style="color: #888; font-size: 0.85rem; margin-top: 25px; margin-bottom: 15px;">Já possui uma conta?</p>
        <a href="login.html" class="btn-outline">Voltar para o Login 🍻</a>
    </div>
</body>
</html>
